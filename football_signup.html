<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Football Sign-Up</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a9e5c;
    --green-dark: #0f6e3e;
    --green-light: #e6f7ef;
    --pitch: #0d5c2e;
    --amber: #f5a623;
    --red: #e23b3b;
    --bg: #f4f6f3;
    --card: #ffffff;
    --text: #1a1f1a;
    --muted: #6b7a6b;
    --border: #d8e0d8;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--pitch);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 1px, transparent 60px);
  }
  .header-inner {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
    padding: 36px 20px 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 56px);
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,.6);
    margin-top: 6px;
    letter-spacing: .5px;
  }
  .header-badge {
    background: var(--amber);
    color: #3a2000;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 99px;
    letter-spacing: .5px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 8px;
  }

  /* MAIN */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* TABS */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .tab {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: .15s;
  }
  .tab:hover { border-color: var(--green); }
  .tab.active {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .tab-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    display: block;
    line-height: 1;
  }
  .tab-count {
    font-size: 12px;
    margin-top: 4px;
    opacity: .7;
    display: block;
  }
  .tab.active .tab-count { opacity: .85; }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }

  /* JOIN CARD */
  .join-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .join-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--green-dark);
    margin-bottom: 14px;
  }
  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 120px;
  }
  .form-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
  }
  .form-group input,
  .form-group select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: .15s;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--green); background: #fff; }
  .join-btn {
    padding: 10px 22px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    align-self: flex-end;
    transition: .15s;
    letter-spacing: .3px;
  }
  .join-btn:hover { background: var(--green-dark); }
  .join-btn:active { transform: scale(.97); }

  /* PROGRESS */
  .prog-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .prog-track {
    flex: 1;
    height: 7px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width .4s ease;
  }
  .prog-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .full-pill {
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 99px;
  }

  /* SLOTS */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .slot {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: .15s;
  }
  .slot.filled {
    border-color: #9FE1CB;
    background: #f0fdf8;
  }
  .slot-num {
    font-size: 11px;
    color: var(--muted);
    min-width: 18px;
  }
  .slot-pos {
    font-size: 11px;
    font-weight: 600;
    color: var(--green-dark);
    background: var(--green-light);
    padding: 2px 7px;
    border-radius: 4px;
    min-width: 38px;
    text-align: center;
  }
  .slot-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }
  .slot-name.empty {
    color: var(--muted);
    font-style: italic;
  }
  .slot-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 15px;
    padding: 2px;
    line-height: 1;
    border-radius: 4px;
    transition: .15s;
  }
  .slot-remove:hover { color: var(--red); background: #fff0f0; }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .act-btn {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: .15s;
  }
  .act-btn:hover { border-color: var(--green); color: var(--green-dark); }
  .act-btn.danger { color: var(--red); border-color: #f0c0c0; }
  .act-btn.danger:hover { background: #fff0f0; border-color: var(--red); }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a1f1a;
    color: #fff;
    padding: 11px 22px;
    border-radius: 99px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
  }

  @media(max-width:480px){
    .slots-grid { grid-template-columns: 1fr 1fr; }
    .form-row { flex-direction: column; }
    .join-btn { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-title">⚽ Football Sign-Up</div>
      <div class="header-sub">3 Teams · 11 Players Each · First Come First Serve</div>
    </div>
    <div class="header-badge">🏆 Match Day</div>
  </div>
</header>

<main>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</main>

<footer>Data saved in your browser · Share this file with your group</footer>
<div id="toast"></div>

<script>
const POSITIONS = ['GK','LB','CB','CB','RB','LM','CM','CM','RM','ST','ST'];
const TEAM_NAMES = ['Team A','Team B','Team C'];
const STORE_KEY = 'fb_signup_v3';

function load() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
}
function save(d) { try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch {} }

let state = load() || {
  teams: TEAM_NAMES.map(n => ({ name: n, slots: POSITIONS.map(p => ({ pos: p, name: '' })) }))
};

let active = 0;

function filled(team) { return team.slots.filter(s => s.name).length; }

function render() {
  // tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = state.teams.map((t, i) =>
    `<button class="tab${i === active ? ' active' : ''}" onclick="setTab(${i})">
      <span class="tab-name">${t.name}</span>
      <span class="tab-count">${filled(t)}/11 players</span>
    </button>`
  ).join('');

  // panels
  const panelsEl = document.getElementById('panels');
  panelsEl.innerHTML = state.teams.map((t, ti) => {
    const fc = filled(t);
    const full = fc === 11;
    const availPos = [...new Set(POSITIONS.filter((_, pi) => !t.slots[pi].name))];

    const joinForm = full ? '' : `
    <div class="join-card">
      <h2>Join ${t.name}</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="name-${ti}" placeholder="e.g. Ahmad Razif" maxlength="30" onkeydown="if(event.key==='Enter')joinTeam(${ti})">
        </div>
        <div class="form-group" style="max-width:110px">
          <label>Position</label>
          <select id="pos-${ti}">
            <option value="">Auto</option>
            ${availPos.map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
        <button class="join-btn" onclick="joinTeam(${ti})">Join ▶</button>
      </div>
    </div>`;

    const slots = t.slots.map((s, si) => `
      <div class="slot${s.name ? ' filled' : ''}">
        <span class="slot-num">#${si+1}</span>
        <span class="slot-pos">${s.pos}</span>
        <span class="slot-name${s.name ? '' : ' empty'}">${s.name || 'Open'}</span>
        ${s.name ? `<button class="slot-remove" onclick="remove(${ti},${si})" title="Remove">✕</button>` : ''}
      </div>`).join('');

    return `<div class="panel${ti === active ? ' active' : ''}">
      ${joinForm}
      <div class="prog-row">
        <div class="prog-track"><div class="prog-fill" style="width:${Math.round(fc/11*100)}%"></div></div>
        <span class="prog-label">${fc}/11</span>
        ${full ? '<span class="full-pill">✅ Full</span>' : ''}
      </div>
      <div class="slots-grid">${slots}</div>
      <div class="actions">
        <button class="act-btn" onclick="copyLineup(${ti})">📋 Copy for WhatsApp</button>
        <button class="act-btn danger" onclick="resetTeam(${ti})">🗑 Reset ${t.name}</button>
        <button class="act-btn danger" onclick="resetAll()">↺ Reset All</button>
      </div>
    </div>`;
  }).join('');
}

function setTab(i) { active = i; render(); }

function joinTeam(ti) {
  const nameEl = document.getElementById(`name-${ti}`);
  const posEl = document.getElementById(`pos-${ti}`);
  const name = nameEl.value.trim();
  if (!name) { toast('Please enter your name'); return; }
  const team = state.teams[ti];
  if (team.slots.some(s => s.name.toLowerCase() === name.toLowerCase())) { toast('Name already registered!'); return; }
  const pref = posEl ? posEl.value : '';
  let idx = -1;
  if (pref) idx = team.slots.findIndex(s => s.pos === pref && !s.name);
  if (idx === -1) idx = team.slots.findIndex(s => !s.name);
  if (idx === -1) { toast('Team is full!'); return; }
  team.slots[idx].name = name;
  save(state);
  toast(`✅ ${name} joined as ${team.slots[idx].pos}!`);
  render();
}

function remove(ti, si) {
  const name = state.teams[ti].slots[si].name;
  state.teams[ti].slots[si].name = '';
  save(state);
  toast(`Removed ${name}`);
  render();
}

function resetTeam(ti) {
  if (!confirm(`Reset ${state.teams[ti].name}? This will clear all ${filled(state.teams[ti])} players.`)) return;
  state.teams[ti].slots.forEach(s => s.name = '');
  save(state);
  toast(`${state.teams[ti].name} cleared`);
  render();
}

function resetAll() {
  if (!confirm('Reset ALL teams? This cannot be undone.')) return;
  state.teams.forEach(t => t.slots.forEach(s => s.name = ''));
  save(state);
  toast('All teams reset');
  render();
}

function copyLineup(ti) {
  const team = state.teams[ti];
  const fc = filled(team);
  let txt = `⚽ *${team.name} Lineup* (${fc}/11)\n`;
  txt += '──────────────────────\n';
  team.slots.forEach((s, i) => {
    txt += `${String(i+1).padStart(2,'0')}. [${s.pos.padEnd(2)}]  ${s.name || '— Open —'}\n`;
  });
  if (fc < 11) txt += `\n📌 ${11 - fc} spot${11-fc>1?'s':''} remaining!`;
  navigator.clipboard.writeText(txt)
    .then(() => toast('Copied! Paste into WhatsApp ✅'))
    .catch(() => toast('Could not copy — try again'));
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

render();
</script>
</body>
</html>
